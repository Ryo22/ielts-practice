<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Adaptive Coach (IAC)</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">
    <div id="app" class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-section">
                <i data-lucide="graduation-cap" class="logo-icon"></i>
                <h1 class="logo-text">IAC</h1>
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span data-i18n="dashboard">ダッシュボード</span>
                </a>
                <a href="#" class="nav-item" data-view="writing">
                    <i data-lucide="pen-tool"></i>
                    <span data-i18n="writing_module">Writing</span>
                </a>
                <a href="#" class="nav-item" data-view="reading">
                    <i data-lucide="book-open"></i>
                    <span data-i18n="reading_module">Reading</span>
                </a>
                <a href="#" class="nav-item" data-view="speaking">
                    <i data-lucide="mic"></i>
                    <span data-i18n="speaking_module">Speaking</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="lang-switch">
                    <button id="lang-ja" class="btn-lang active">JA</button>
                    <button id="lang-en" class="btn-lang">EN</button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h2 id="view-title" data-i18n="dashboard">ダッシュボード</h2>
                </div>
            </header>

            <!-- Dashboard View -->
            <section id="dashboard-view" class="view-section">
                <div class="card intro-card">
                    <h3 data-i18n="target_overall_settings">目標スコア設定</h3>
                    <p data-i18n="overall_formula">各セクションの目標を入力してください。Overallが自動計算されます。</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card primary">
                        <div class="stat-info">
                            <span class="stat-label" data-i18n="target_overall">目標 Overall</span>
                            <span id="target-overall-val" class="stat-value">7.5</span>
                        </div>
                        <div class="stat-progress">
                            <div class="progress-bar"><div id="overall-progress" class="progress-fill" style="width: 80%;"></div></div>
                        </div>
                    </div>
                    <!-- Target Inputs -->
                    <div class="stat-card input-card">
                        <span class="stat-label">Listening</span>
                        <select id="target-l" class="score-select"></select>
                    </div>
                    <div class="stat-card input-card">
                        <span class="stat-label">Reading</span>
                        <select id="target-r" class="score-select"></select>
                    </div>
                    <div class="stat-card input-card">
                        <span class="stat-label">Writing</span>
                        <select id="target-w" class="score-select"></select>
                    </div>
                    <div class="stat-card input-card">
                        <span class="stat-label">Speaking</span>
                        <select id="target-s" class="score-select"></select>
                    </div>
                </div>

                <div class="content-grid">
                    <div class="card card-recommendation">
                        <h3 data-i18n="recommendation">今日のおすすめ学習</h3>
                        <div id="recommendation-list" class="rec-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Writing View -->
            <section id="writing-view" class="view-section hidden">
                <div class="action-bar">
                    <button id="btn-gen-writing" class="btn-secondary">
                        <i data-lucide="sparkles"></i>
                        <span data-i18n="start_practice">問題を生成する</span>
                    </button>
                </div>

                <div id="writing-task-container" class="card task-display hidden">
                    <div class="task-header">
                        <span class="badge">Writing Task 2</span>
                        <h4 id="writing-prompt-title">...</h4>
                    </div>
                    <p id="writing-prompt-body" class="task-body"></p>
                </div>

                <div class="card workspace">
                    <textarea id="writing-input" class="essay-textarea" data-i18n-placeholder="placeholder_essay" placeholder="エッセイを入力してください..."></textarea>
                    <div class="workspace-footer">
                        <button id="btn-submit-writing" class="btn-primary" disabled>
                            <i data-lucide="send"></i>
                            <span data-i18n="submit_essay">提出して添削を受ける</span>
                        </button>
                    </div>
                </div>

                <div id="writing-feedback" class="card feedback-panel hidden">
                    <!-- Feedback injected here -->
                </div>
            </section>

            <!-- Reading View -->
            <section id="reading-view" class="view-section hidden">
                <div class="action-bar">
                    <button id="btn-gen-reading" class="btn-secondary">
                        <i data-lucide="sparkles"></i>
                        <span data-i18n="start_practice">読解問題を生成する</span>
                    </button>
                </div>
                <div id="reading-content" class="reading-grid">
                    <!-- Passage and Questions -->
                </div>
            </section>

            <!-- Speaking View -->
            <section id="speaking-view" class="view-section hidden">
                <div class="card mock-interview">
                    <div class="interview-header">
                        <i data-lucide="mic" class="mic-icon large"></i>
                        <h3 data-i18n="speaking_module">Speaking 練習</h3>
                    </div>
                    <div id="speaking-prompt" class="prompt-box">
                        <p data-i18n="speaking_coming_soon">近日公開予定のAI音声対話モード、または現在はテキストベースの練習が可能です。</p>
                        <button id="btn-gen-speaking" class="btn-secondary">トピックを生成</button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- SDK & Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
