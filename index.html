<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Adaptive Coach (IAC)</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">
    <div id="app" class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-section">
                <i data-lucide="graduation-cap" class="logo-icon"></i>
                <h1 class="logo-text">IAC</h1>
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span data-i18n="dashboard">ダッシュボード</span>
                </a>
                <a href="#" class="nav-item" data-view="writing">
                    <i data-lucide="pen-tool"></i>
                    <span data-i18n="writing_module">Writing</span>
                </a>
                <a href="#" class="nav-item" data-view="reading">
                    <i data-lucide="book-open"></i>
                    <span data-i18n="reading_module">Reading</span>
                </a>
                <a href="#" class="nav-item" data-view="speaking">
                    <i data-lucide="mic"></i>
                    <span data-i18n="speaking_module">Speaking</span>
                </a>
                <a href="#" class="nav-item" data-view="settings">
                    <i data-lucide="settings"></i>
                    <span data-i18n="settings">設定</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="lang-switch">
                    <button id="lang-ja" class="btn-lang active">JA</button>
                    <button id="lang-en" class="btn-lang">EN</button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h2 id="view-title" data-i18n="dashboard">ダッシュボード</h2>
                </div>
                <div class="header-right">
                    <div class="user-badge">
                        <span id="user-name">IELTS 7.5 Goals</span>
                        <div class="avatar">U</div>
                    </div>
                </div>
            </header>

            <section id="dashboard-view" class="view-section">
                <div class="stats-grid">
                    <div class="stat-card primary">
                        <div class="stat-info">
                            <span class="stat-label" data-i18n="target_overall">目標 Overall</span>
                            <span class="stat-value">7.5</span>
                        </div>
                        <div class="stat-progress">
                            <div class="progress-bar"><div class="progress-fill" style="width: 80%;"></div></div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">L</span>
                        <span class="stat-value">8.0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">R</span>
                        <span class="stat-value">8.5</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">W</span>
                        <span class="stat-value">7.0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">S</span>
                        <span class="stat-value">7.0</span>
                    </div>
                </div>

                <div class="content-grid">
                    <div class="card card-recommendation">
                        <h3 data-i18n="recommendation">今日のおすすめ学習</h3>
                        <div class="rec-item">
                            <i data-lucide="edit-3"></i>
                            <div>
                                <h4>Writing Task 2</h4>
                                <p>トピック: 気候変動と政府の役割</p>
                            </div>
                        </div>
                    </div>
                    <div class="card card-analysis">
                        <h3 data-i18n="weaknesses">弱点分析</h3>
                        <div class="analysis-chart-placeholder">
                            [レーダーチャートがここに表示されます]
                        </div>
                    </div>
                </div>
            </section>

            <section id="writing-view" class="view-section hidden">
                <div class="card writing-workspace">
                    <div class="workspace-header">
                        <h3>IELTS Writing Task 2</h3>
                        <div class="task-info">Time Left: 40:00</div>
                    </div>
                    <textarea id="writing-input" class="essay-textarea" data-i18n-placeholder="placeholder_essay" placeholder="エッセイをここに書き込んでください..."></textarea>
                    <div class="workspace-footer">
                        <button id="btn-submit-writing" class="btn-primary">
                            <i data-lucide="send"></i>
                            <span data-i18n="submit_essay">提出する</span>
                        </button>
                    </div>
                </div>

                <div id="writing-feedback" class="card feedback-panel hidden">
                    <div class="feedback-header">
                        <h3 data-i18n="feedback_title">AI 評価 & 添削</h3>
                        <div class="score-badge">7.0</div>
                    </div>
                    <div class="feedback-body">
                        <!-- AI Feedback content dynamically injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- SDK & Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
